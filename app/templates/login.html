{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow p-6 mt-20">
  <h1 class="text-2xl font-bold mb-4">Iniciar sesión</h1>
  <form id="loginForm" class="space-y-4">
    <input class="w-full border rounded px-3 py-2" type="email" placeholder="Email" id="email" required />
    <input class="w-full border rounded px-3 py-2" type="password" placeholder="Contraseña" id="password" required />
    <button class="w-full bg-indigo-600 text-white rounded py-2 font-semibold" type="submit">Entrar</button>
  </form>
  <p id="msg" class="text-sm text-red-600 mt-3"></p>
</div>
<script>
  const f = document.getElementById('loginForm');
  f.addEventListener('submit', async (e) => {
    e.preventDefault();
    const res = await fetch('/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email.value, password: password.value })
    });
    if (!res.ok) return msg.textContent = 'Credenciales incorrectas';
    const data = await res.json();
    localStorage.setItem('token', data.access_token);
    location.href = '/dashboard';
  });
</script>
{% endblock %}
