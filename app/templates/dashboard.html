{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold">Dashboard</h1>
  <div class="flex items-center gap-4">
    <span class="text-sm">Usuario: {{ user.name }} ({{ user.plan }})</span>
    <button class="px-3 py-1 rounded bg-gray-200" onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<div class="grid md:grid-cols-2 gap-6">
  <div class="bg-white rounded-2xl shadow p-4">
    <h2 class="font-semibold mb-2">Nuevo análisis</h2>
    <input id="source_name" class="w-full border rounded px-3 py-2 mb-2" placeholder="Nombre del archivo / fuente" />
    <textarea id="raw_log" class="w-full border rounded px-3 py-2 h-40" placeholder="Pega aquí tu log..."></textarea>
    <button class="mt-3 bg-indigo-600 text-white px-4 py-2 rounded" onclick="runAnalysis()">Analizar</button>
    <p id="a_msg" class="text-sm text-red-600 mt-2"></p>
  </div>

  <div class="bg-white rounded-2xl shadow p-4">
    <h2 class="font-semibold mb-2">Historial</h2>
    <div class="flex gap-2 mb-2">
      <input type="date" id="start" class="border rounded px-2 py-1" />
      <input type="date" id="end" class="border rounded px-2 py-1" />
      <button class="bg-gray-800 text-white px-3 py-1 rounded" onclick="loadHistory()">Filtrar</button>
    </div>
    <ul id="history" class="space-y-2 text-sm"></ul>
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  if (!token) location.href = '/';

  async function runAnalysis(){
    const payload = { source_name: source_name.value || null, raw_log: raw_log.value };
    const res = await fetch('/analysis/run', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(payload)
    });
    if(!res.ok){
      const err = await res.json();
      a_msg.textContent = err.detail || 'Error al analizar';
      return;
    }
    const item = await res.json();
    a_msg.textContent = 'Análisis completado';
    raw_log.value='';
    addItem(item);
  }

  function addItem(a){
    const li = document.createElement('li');
    li.className = 'border rounded p-2';
    li.innerHTML = `<div class="flex justify-between"><b>${a.source_name||'log.txt'}</b><span>${new Date(a.created_at).toLocaleString()}</span></div>
      <div>Riesgo: <b>${a.score_risk}</b></div>
      <div>${a.result_summary}</div>
      ${a.pdf_path ? `<a class="text-indigo-600 underline" href="/${a.pdf_path}" target="_blank">Descargar PDF</a>` : '<i class="text-gray-500">PDF (solo Pro)</i>'}`;
    history.prepend(li);
  }

  async function loadHistory(){
    const qs = new URLSearchParams();
    if (start.value) qs.set('start', start.value);
    if (end.value) qs.set('end', end.value);
    const res = await fetch('/history/list?'+qs.toString(), { headers: { 'Authorization': 'Bearer ' + token } });
    const items = await res.json();
    history.innerHTML = '';
    items.forEach(addItem);
  }

  function logout(){ localStorage.removeItem('token'); location.href='/'; }

  loadHistory();
</script>
{% endblock %}
